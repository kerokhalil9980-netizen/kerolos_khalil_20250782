<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add a New Course - Control Panel</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h2 class="logo">Personal Course Organizer</h2>
            <ul class="nav-links">
                <li><a href="Home.html">Home</a></li>
                <li><a href="my-course.html">my Course</a></li>
                <li><a href="add-course.html" class="active">Add Course</a></li>
                <li><a href="contact-Us.html">Contact Us</a></li>
            </ul>
        </div>
    </nav>

    <div class="form-container">
        <h1>Add a New Course</h1>
        
        <form>
            <div class="form-group">
                <input type="text" id="courseName" placeholder=" " required>
                <label for="courseName">Course Name</label>
            </div>

            <div class="form-group">
                <input type="text" id="instructor" placeholder=" " required>
                <label for="instructor">Dr Name</label>
            </div>

            <div class="form-group">
                <input type="number" id="creditHours" placeholder=" " min="1" required>
                <label for="creditHours">Credit Hours</label>
            </div>

            <div class="form-group">
                <textarea id="notes" placeholder=" "></textarea>
                <label for="notes">Enter Your Notes</label>
            </div>

            <button type="submit" class="submit-btn">Add Course</button>
        </form>
    </div>
</body>
</html>
